apiVersion: v1
kind: Service
metadata:
  name: {{ include "doen.fullname" . }}
  labels: {{- include "doen.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
  selector: {{- include "doen.selectorLabels" . | nindent 4 }}
