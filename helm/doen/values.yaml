replicaCount: 1

image:
  repository: ghcr.io/stevendejongnl/doen
  tag: latest
  pullPolicy: Always

keel:
  policy: force
  pollSchedule: "@every 5m"

service:
  port: 8000

ingress:
  enabled: true
  className: nginx
  host: doen.madebysteven.nl
  tls: false

# Environment config
config:
  dbMode: postgres
  debug: "false"
  haBaseUrl: ""
  haClientId: "https://doen.madebysteven.nl/"

# Secrets (override via --set or values file)
secret:
  secretKey: "change-me-in-production"
  databaseUrl: ""

# Persistent volume for SQLite fallback (only used when dbMode=sqlite)
persistence:
  enabled: false
  storageClass: local-storage-default
  size: 1Gi
  mountPath: /app/data

nodeSelector:
  kubernetes.io/hostname: worker-01

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
