name: Doen
slug: doen
description: Personal & household task planning, integrated with Home Assistant
version: "0.1.0"
url: "https://github.com/stevendejong/planning-thing"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
startup: application
boot: auto
ingress: true
ingress_port: 8000
auth_api: true
panel_icon: mdi:check-circle
panel_title: Doen
options:
  db_mode: sqlite
  pg_url: ""
  ha_base_url: ""
  secret_key: "change-me"
schema:
  db_mode: "list(sqlite|postgres)"
  pg_url: str
  ha_base_url: str
  secret_key: str
map:
  - share:rw
