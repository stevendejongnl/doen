# Binds to a hostPath PV doen-data-pv. Adjust storageClassName and volumeName for your cluster.
# PV has Retain reclaim policy — SQLite file survives PVC recreation.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: doen-data
  namespace: doen
  labels:
    app: doen
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage-default
  resources:
    requests:
      storage: 1Gi
  volumeName: doen-data-pv
