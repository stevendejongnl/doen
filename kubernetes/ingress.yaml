apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: doen
  namespace: doen
  labels:
    app: doen
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # NOTE: configuration-snippet annotations are blocked by the cluster's
    # ingress-nginx admission webhook (allow-snippet-annotations is off).
    # If SPA shell caching becomes stale after deploys, set
    # Cache-Control for index.html from FastAPI (StaticFiles wrapper).
spec:
  ingressClassName: nginx
  rules:
    - host: doen.example.com  # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: doen
                port:
                  number: 8000
