apiVersion: apps/v1
kind: Deployment
metadata:
  name: doen
  namespace: doen
  labels:
    app: doen
  annotations:
    keel.sh/policy: major
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 5m"
    keel.sh/match-tag: "true"
spec:
  replicas: 1
  # PVC is ReadWriteOnce — only one pod can mount it at a time.
  # Recreate avoids the deadlock where a new pod can never start because the
  # old pod still holds the volume.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: doen
  template:
    metadata:
      labels:
        app: doen
    spec:
      containers:
        - name: doen
          # Semver tag + keel policy: major + match-tag means Keel rolls whenever
          # CI pushes a newer semver tag (`semantic-release` tags every merge to main).
          # Replace <owner> with your GitHub username/org.
          image: ghcr.io/<owner>/doen:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: doen-config
            - secretRef:
                name: doen-secret
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: doen-data
