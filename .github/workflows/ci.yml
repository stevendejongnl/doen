name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv run pytest --tb=short

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv run ruff check app/
      - run: uv run mypy app/

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  ha-card-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ha-card
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ha-card/package-lock.json
      - run: npm ci
      - run: npm run build

  docker-build:
    needs: [backend-test, frontend-build, ha-card-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build and push to homelab registry
        # Homelab registry is HTTP-only; configure daemon to allow insecure push.
        # REGISTRY_HOST secret should be set to 192.168.1.7:5000 (or a tunnel host).
        run: |
          echo '{"insecure-registries": ["${{ secrets.REGISTRY_HOST }}"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl reload docker
          docker build -t ${{ secrets.REGISTRY_HOST }}/doen:latest \
                       -t ${{ secrets.REGISTRY_HOST }}/doen:${{ github.sha }} .
          docker push ${{ secrets.REGISTRY_HOST }}/doen:latest
          docker push ${{ secrets.REGISTRY_HOST }}/doen:${{ github.sha }}
      - name: Notify deploy
        run: echo "Image pushed as ${{ secrets.REGISTRY_HOST }}/doen:${{ github.sha }}"

  helm-deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config
      - name: Helm deploy to doen namespace
        run: |
          helm upgrade --install doen ./helm/doen \
            -n doen --create-namespace \
            --set image.repository=${{ secrets.REGISTRY_HOST }}/doen \
            --set image.tag=${{ github.sha }} \
            --set secret.secretKey=${{ secrets.DOEN_SECRET_KEY }} \
            --set secret.databaseUrl=${{ secrets.DOEN_DATABASE_URL }} \
            --set config.haBaseUrl=${{ secrets.DOEN_HA_BASE_URL }} \
            --wait --timeout=120s
