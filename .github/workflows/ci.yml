name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv run pytest --tb=short

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv run ruff check app/
      - run: uv run mypy app/ || true

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  release:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram — release created
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VERSION: ${{ steps.semantic.outputs.new_release_version }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT: ${{ github.sha }}
        run: |
          chmod +x scripts/send-telegram-notification.sh
          scripts/send-telegram-notification.sh \
            --type release_success \
            --version "$VERSION" \
            --branch "$BRANCH" \
            --run-url "$RUN_URL" \
            --commit "$COMMIT" \
            --repo "$REPO"

      - name: Notify Telegram — no release needed
        if: steps.semantic.outputs.new_release_published != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT: ${{ github.sha }}
        run: |
          chmod +x scripts/send-telegram-notification.sh
          scripts/send-telegram-notification.sh \
            --type release_skip \
            --branch "$BRANCH" \
            --run-url "$RUN_URL" \
            --commit "$COMMIT" \
            --repo "$REPO"

  docker-publish:
    needs: release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine tags and version
        id: tags
        env:
          OWNER: ${{ github.repository_owner }}
          NEW_RELEASE: ${{ needs.release.outputs.new_release_published }}
          NEW_VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          IMAGE="ghcr.io/${OWNER}/doen"
          TAGS="${IMAGE}:latest"
          if [ "$NEW_RELEASE" = "true" ]; then
            VERSION="$NEW_VERSION"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          fi
          TAGS="$TAGS,${IMAGE}:v${VERSION}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f1-2)
          TAGS="$TAGS,${IMAGE}:v${MAJOR},${IMAGE}:v${MINOR}"
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: APP_VERSION=${{ steps.tags.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Telegram — image pushed
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VERSION: ${{ steps.tags.outputs.version }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT: ${{ github.sha }}
        run: |
          chmod +x scripts/send-telegram-notification.sh
          scripts/send-telegram-notification.sh \
            --type docker_success \
            --version "$VERSION" \
            --branch "$BRANCH" \
            --run-url "$RUN_URL" \
            --commit "$COMMIT" \
            --repo "$REPO"

      - name: Notify Telegram — image build failed
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT: ${{ github.sha }}
        run: |
          chmod +x scripts/send-telegram-notification.sh
          scripts/send-telegram-notification.sh \
            --type docker_failure \
            --branch "$BRANCH" \
            --run-url "$RUN_URL" \
            --commit "$COMMIT" \
            --repo "$REPO"

  notify-ci-failure:
    needs: [backend-test, backend-lint, frontend-build, release, docker-publish]
    if: failure() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify Telegram — CI failed on main
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT: ${{ github.sha }}
        run: |
          chmod +x scripts/send-telegram-notification.sh
          scripts/send-telegram-notification.sh \
            --type ci_failure \
            --branch "$BRANCH" \
            --run-url "$RUN_URL" \
            --commit "$COMMIT" \
            --repo "$REPO"
