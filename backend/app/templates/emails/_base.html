<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark" />
    <title>{% block title %}Doen{% endblock %}</title>
  </head>
  <body style="margin:0;padding:0;background:#f5f6fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1f2230;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f6fa;padding:32px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="520" cellpadding="0" cellspacing="0" style="max-width:520px;background:#ffffff;border-radius:18px;overflow:hidden;box-shadow:0 4px 24px rgba(20,24,50,0.06);">
            <tr>
              <td style="padding:28px 32px 12px 32px;border-bottom:1px solid #eef0f6;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="display:inline-block;vertical-align:middle;">
                  <tr>
                    <td width="36" height="36" style="width:36px;height:36px;border-radius:10px;background:#6366f1;background-image:linear-gradient(135deg,#6366f1,#8b5cf6);text-align:center;vertical-align:middle;">
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;">
                        <polyline points="1,13 7,19 14,9"></polyline>
                        <polyline points="10,13 16,19 23,6"></polyline>
                      </svg>
                    </td>
                  </tr>
                </table>
                <span style="display:inline-block;margin-left:10px;font-size:18px;font-weight:700;vertical-align:middle;letter-spacing:-0.2px;color:#1f2230;">Doen</span>
              </td>
            </tr>
            <tr>
              <td style="padding:28px 32px 32px 32px;font-size:15px;line-height:1.55;color:#2a2e44;">
                {% block content %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td style="padding:18px 32px 26px 32px;border-top:1px solid #eef0f6;font-size:12px;color:#8a90a6;">
                Je krijgt deze mail omdat iemand je heeft toegevoegd aan Doen.
                Niet aangevraagd? Negeer dan gerust — er gebeurt niets zonder jouw actie.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
